name: Publish Changed Skills to ClawHub

on:
  push:
    branches:
      - main
    paths:
      - "openclaw/**/SKILL.md"

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff against

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Detect changed SKILL.md files
        id: changed
        run: |
          # On the initial commit HEAD~1 doesn't exist — publish all skills instead
          if git rev-parse HEAD~1 > /dev/null 2>&1; then
            changed=$(git diff --name-only HEAD~1 HEAD -- 'openclaw/**/SKILL.md')
          else
            echo "Initial commit detected — publishing all SKILL.md files"
            changed=$(git diff-tree --no-commit-id -r --name-only HEAD -- 'openclaw/**/SKILL.md')
          fi

          if [ -z "$changed" ]; then
            echo "No SKILL.md files changed."
            echo "folders=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed SKILL.md files:"
          echo "$changed"

          # Extract skill folder paths (strip /SKILL.md suffix)
          # Path format: openclaw/<pack>/<skill-slug>/SKILL.md → openclaw/<pack>/<skill-slug>
          folders=$(echo "$changed" | sed 's|/SKILL\.md$||' | sort -u | tr '\n' ' ')
          echo "Skill folders to publish: $folders"
          echo "folders=$folders" >> "$GITHUB_OUTPUT"

      - name: Publish changed skills
        if: steps.changed.outputs.folders != ''
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          failed=()

          for folder in ${{ steps.changed.outputs.folders }}; do
            echo "──────────────────────────────────────"
            echo "Publishing: $folder"
            if clawhub publish "$folder"; then
              echo "✅ $folder published"
            else
              echo "❌ $folder failed"
              failed+=("$folder")
            fi
          done

          echo "──────────────────────────────────────"

          if [ ${#failed[@]} -gt 0 ]; then
            echo "❌ Failed to publish: ${failed[*]}"
            exit 1
          fi

          echo "✅ All skills published successfully"

      - name: No skills changed
        if: steps.changed.outputs.folders == ''
        run: echo "No SKILL.md files changed — nothing to publish."
