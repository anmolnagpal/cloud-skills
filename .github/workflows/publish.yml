name: Publish Changed Skills to ClawHub

on:
  push:
    branches:
      - main
    paths:
      - "openclaw/**/SKILL.md"

jobs:
  publish:
    name: Publish to ClawHub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff against

      - name: Install ClawHub CLI
        run: npm install -g clawhub@latest

      - name: Detect changed SKILL.md files
        id: changed
        run: |
          # Get list of changed SKILL.md files in openclaw/
          changed=$(git diff --name-only HEAD~1 HEAD -- 'openclaw/**/SKILL.md')

          if [ -z "$changed" ]; then
            echo "No SKILL.md files changed."
            echo "skills=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed SKILL.md files:"
          echo "$changed"

          # Extract skill slugs (directory name containing SKILL.md)
          # Path format: openclaw/<pack>/<skill-slug>/SKILL.md
          slugs=$(echo "$changed" | awk -F'/' '{print $3}' | sort -u | tr '\n' ' ')
          echo "Skill slugs to publish: $slugs"
          echo "skills=$slugs" >> "$GITHUB_OUTPUT"

      - name: Publish changed skills
        if: steps.changed.outputs.skills != ''
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          failed=()

          for slug in ${{ steps.changed.outputs.skills }}; do
            echo "──────────────────────────────────────"
            echo "Publishing: $slug"
            if clawhub publish "$slug"; then
              echo "✅ $slug published"
            else
              echo "❌ $slug failed"
              failed+=("$slug")
            fi
          done

          echo "──────────────────────────────────────"

          if [ ${#failed[@]} -gt 0 ]; then
            echo "❌ Failed to publish: ${failed[*]}"
            exit 1
          fi

          echo "✅ All skills published successfully"

      - name: No skills changed
        if: steps.changed.outputs.skills == ''
        run: echo "No SKILL.md files changed — nothing to publish."
